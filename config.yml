# ── ABOUT SECTION ──
about:
  section_label: "Who I Am"
  section_title: "Committed to Justice & the Law"
  bio:
    - paragraph: >
        I am a fourth-year B.A.; LL.B (Hons.) student at SASTRA Deemed University,
        Thanjavur, with a strong foundation in legal research, litigation support,
        and courtroom advocacy.
    - paragraph: >
        Across multiple internships at district courts and high courts — from
        Thalassery to the Madras High Court and Kerala High Court — I have honed
        my ability to draft legal documents, conduct in-depth case research, and
        assist senior advocates in complex matters.
    - paragraph: >
        My achievements in moot court competitions reflect my passion for oral
        advocacy and argumentation. I also serve as Treasurer of KS Upahaar,
        a not-for-profit organization dedicated to the underprivileged.

