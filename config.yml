    success: "✓ Resume uploaded successfully."
    error_format: "✕ Please upload a PDF or Word document."
    error_size: "✕ File exceeds 10MB limit."

# ── CONTACT SECTION ──
contact:
  section_label: "Get In Touch"
  section_title: "Let's Connect"
  form:
    fields:
      - id: "fname"
        label: "First Name"
        type: "text"
        placeholder: "Your first name"
        required: true
      - id: "lname"
        label: "Last Name"
        type: "text"
        placeholder: "Your last name"
        required: false
      - id: "email"
        label: "Email Address"
        type: "email"
        placeholder: "your@email.com"
        required: true
      - id: "subject"
        label: "Subject"
        type: "text"
        placeholder: "How can I help?"
        required: true
      - id: "message"
        label: "Message"
        type: "textarea"
        placeholder: "Your message here..."
        rows: 5
        required: false
    submit_label: "Send Message"
    success_message: "✓ Message sent successfully. I will get back to you soon."
    error_message: "✕ Please fill in all required fields."

